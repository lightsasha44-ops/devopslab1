# Self-signed Issuer — issues certificates for our domain
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certManager.issuerName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.app.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  selfSigned: {}
---
# Certificate — TLS cert for hello-app.local
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificateName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.app.name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  # Secret where the certificate will be stored
  secretName: {{ .Values.gateway.tlsSecretName }}
  # Certificate validity
  duration: {{ .Values.certManager.duration }}
  renewBefore: {{ .Values.certManager.renewBefore }}
  # Domain names
  dnsNames:
    - {{ .Values.gateway.host }}
  # Reference to the issuer
  issuerRef:
    name: {{ .Values.certManager.issuerName }}
    kind: Issuer
